<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#00b894">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Finanzas">
  <title>Finanzas Personales</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="apple-touch-icon" sizes="180x180" href="img/app-icon-180.png">
  <link rel="stylesheet" href="css/main.css?v=2024">
  <link rel="stylesheet" href="css/dashboard.css?v=2024">
  <link rel="stylesheet" href="css/forms.css">
  <link rel="stylesheet" href="css/accordion.css">
  <link rel="stylesheet" href="css/config.css">
  <link rel="stylesheet" href="css/patrimonio.css">
  <link rel="stylesheet" href="css/cashflow.css">
  <link rel="stylesheet" href="css/dark-mode.css">
  <link rel="stylesheet" href="css/grupoGastoView.custom.css">
  <link rel="stylesheet" href="css/nav.css">
  <link rel="stylesheet" href="css/connection.css">
  <link rel="stylesheet" href="css/auth.css">
  <link rel="icon" type="image/png" sizes="192x192" href="img/app-icon-192.png" />
  <link rel="icon" type="image/png" sizes="512x512" href="img/app-icon-512.png" />
</head>
<body>
  <div id="app">
    <!-- Pantalla de autenticación -->
    <div id="auth-screen" class="auth-screen hidden">
      <div class="auth-background"></div>
      <div class="auth-content" id="auth-content">
        <!-- El contenido se genera dinámicamente -->
      </div>
    </div>

    <!-- Pantalla de carga/conexión -->
    <div id="connection-screen" class="connection-screen hidden">
      <div class="connection-background"></div>
      <div class="connection-content">
        <div class="connection-spinner">
          <div class="spinner-ring"></div>
          <div class="spinner-ring"></div>
          <div class="spinner-ring"></div>
        </div>
        <h2 class="connection-title" id="connection-title">Conectando con el servidor...</h2>
        <p class="connection-message" id="connection-message">Por favor espera un momento</p>
        <button class="connection-retry-btn hidden" id="connection-retry-btn">Reintentar conexión</button>
      </div>
    </div>

    <!-- Header y navegación -->
    <header class="header">
      <div class="container">
        <button class="menu-toggle" id="menu-toggle" aria-label="Menú">☰</button>
        <nav class="nav" id="nav">
          <button class="nav-btn" data-route="dashboard">Dashboard</button>
          <button class="nav-btn" data-route="gastos">Gastos</button>
          <button class="nav-btn" data-route="grupo_gastos">Grupos de Gastos</button>
          <button class="nav-btn" data-route="ingresos">Ingresos</button>
          <button class="nav-btn" data-route="grupo_ingresos">Grupos de Ingresos</button>
          <button class="nav-btn" data-route="deudas">Deudas</button>
          <button class="nav-btn" data-route="prestamos">Préstamos</button>
          <button class="nav-btn" data-route="patrimonio">Patrimonio</button>
          <button class="nav-btn" data-route="cashflow">Cashflow</button>
          <button class="nav-btn" data-route="ahorros">Ahorros</button>
          <button class="nav-btn" data-route="custodia">Custodia</button>
          <button class="nav-btn" data-route="auditoria">Auditoría</button>
        </nav>
        <h1 class="logo">Finanzas</h1>
        <button class="config-btn" data-route="configuracion" title="Configuración">⚙️</button>
        <button class="sync-btn" id="sync-btn" title="Sincronizar con MongoDB">🔄</button>
        <div class="sync-status" id="sync-status">
          <span class="sync-indicator"></span>
          <span class="sync-text">Sincronizado</span>
        </div>
      </div>
    </header>

    <!-- Contenedor principal -->
    <main class="main-content" id="main-content">
      <!-- El contenido se cargará dinámicamente aquí -->
    </main>

    <!-- Modal para mensajes -->
    <div class="modal" id="modal">
      <div class="modal-content">
        <span class="modal-close">&times;</span>
        <div class="modal-body" id="modal-body"></div>
      </div>
    </div>

    <!-- Loading overlay -->
    <div class="loading-overlay" id="loading-overlay">
      <div class="spinner"></div>
    </div>

    <!-- Modal de confirmación -->
    <div class="confirm-modal" id="confirm-modal">
      <div class="confirm-modal-content">
        <div class="confirm-modal-icon">⚠️</div>
        <h3 class="confirm-modal-title" id="confirm-modal-title">Confirmar acción</h3>
        <p class="confirm-modal-message" id="confirm-modal-message"></p>
        <div class="confirm-modal-actions">
          <button class="btn btn-secondary" id="confirm-modal-cancel">Cancelar</button>
          <button class="btn btn-danger" id="confirm-modal-confirm">Confirmar</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Scripts -->
  <!-- Configuración de entorno generada dinámicamente -->
  <script src="js/env_config.js"></script>
  <script src="js/services/authService.js"></script>
  <script src="js/services/connectionService.js"></script>
  <script src="js/utils/logger.js"></script>
  <script src="js/utils/calculations.js"></script>
  <script src="js/utils/router.js"></script>
  <script src="js/utils/formBuilder.js"></script>
  <script src="js/services/cacheService.js"></script>
  <script src="js/services/syncService.js"></script>
  <script src="js/services/validationService.js"></script>
  <script src="js/models/config.js"></script>
  <script src="js/models/gasto.js"></script>
  <script src="js/models/gastoAutomatico.js"></script>
  <script src="js/models/ingreso.js"></script>
  <script src="js/models/ingresoAutomatico.js"></script>
  <script src="js/models/deuda.js"></script>
  <script src="js/models/prestamo.js"></script>
  <script src="js/models/patrimonio.js"></script>
  <script src="js/models/ahorro.js"></script>
  <script src="js/models/custodia.js"></script>
  <script src="js/models/cashflow.js"></script>
  <script src="js/models/auditoria.js"></script>
  <script src="js/controllers/gastosController.js"></script>
  <script src="js/models/grupoGasto.js"></script>
  <script src="js/views/grupoGastoView.js"></script>
  <script src="js/models/grupoIngreso.js"></script>
  <script src="js/views/grupoIngresoView.js"></script>
  <script src="js/controllers/gruposController.js"></script>
  <script src="js/controllers/ingresosController.js"></script>
  <script src="js/controllers/deudasController.js"></script>
  <script src="js/controllers/prestamosController.js"></script>
  <script src="js/controllers/patrimonioController.js"></script>
  <script src="js/controllers/ahorrosController.js"></script>
  <script src="js/controllers/custodiaController.js"></script>
  <script src="js/controllers/cashflowController.js"></script>
  <script src="js/controllers/auditoriaController.js"></script>
  <script src="js/controllers/configController.js"></script>
  <script src="js/views/dashboardView.js"></script>
  <script src="js/views/ahorrosView.js"></script>
  <script src="js/views/custodiaView.js"></script>
  <script src="js/views/auditoriaView.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
